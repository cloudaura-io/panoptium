# NOTE: AgentGateway v1.0.1 does not support ExtProc ImmediateResponse.
# Deny actions (HTTP 403) and rateLimit actions (HTTP 429) will cause the
# gateway to return 503 instead of the expected status code. This is an
# AgentGateway limitation, not a Panoptium bug. Tool stripping (deny on
# tool_call) works correctly. Track: agentgateway/agentgateway#TBD
#
# After 3 denied requests within 60 seconds, quarantine the agent pod.
# Creates an AgentQuarantine resource which triggers:
#   - deny-all NetworkPolicy
#   - eBPF-LSM syscall restrictions
#   - optional pod eviction
apiVersion: panoptium.io/v1alpha1
kind: AgentPolicy
metadata:
  name: escalate-repeated-violations
  namespace: default
spec:
  targetSelector:
    matchLabels:
      app: my-agent
  enforcementMode: enforcing
  priority: 100
  rules:
    - name: deny-and-escalate
      trigger:
        eventCategory: protocol
        eventSubcategory: tool_call
      predicates:
        - cel: "event.toolName == 'dangerous_tool'"
      action:
        type: deny
        parameters:
          escalationThreshold: "3"
          escalationWindow: "60"
          escalationAction: "quarantine"
      severity: CRITICAL
