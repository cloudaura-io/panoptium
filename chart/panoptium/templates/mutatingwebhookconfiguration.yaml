{{- if and .Values.webhook.enabled .Values.webhook.certManager }}
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "panoptium.fullname" . }}-mutating
  labels:
    {{- include "panoptium.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Release.Namespace }}/{{ include "panoptium.fullname" . }}-webhook-cert
webhooks:
  - name: mpod.panoptium.io
    admissionReviewVersions: [v1]
    clientConfig:
      service:
        name: {{ include "panoptium.fullname" . }}-webhook
        namespace: {{ .Release.Namespace }}
        path: /mutate--v1-pod
    failurePolicy: Fail
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            {{- range .Values.excludedNamespaces }}
            - {{ . | quote }}
            {{- end }}
    rules:
      - apiGroups: [""]
        apiVersions: [v1]
        operations: [CREATE, UPDATE]
        resources: [pods]
    sideEffects: None
{{- end }}
