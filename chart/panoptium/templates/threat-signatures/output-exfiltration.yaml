{{- if .Values.threatSignatures.enabled }}
apiVersion: panoptium.io/v1alpha1
kind: ThreatSignature
metadata:
  name: mcp-output-exfiltration
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-delete-policy": before-hook-creation
    "helm.sh/hook-weight": "10"
  labels:
    {{- include "panoptium.labels" . | nindent 4 }}
    panoptium.io/managed-by: helm
    panoptium.io/signature-set: default
spec:
  protocols:
    - mcp
    - a2a
  category: data_exfiltration
  severity: HIGH
  mitreAtlas: "AML.T0048.002"
  description: >-
    Detects attempts to exfiltrate sensitive data by instructing the LLM to
    output, print, display, reveal, or show secrets, keys, passwords,
    credentials, or tokens.
  detection:
    patterns:
      - regex: '(?i)(output|print|display|reveal|show)\s+(all\s+)?(system\s+)?(secrets?|keys?|passwords?|credentials?|tokens?)'
        weight: 0.85
        target: tool_description
      - regex: '(?i)(output|print|display|reveal|show)\s+(all\s+)?(system\s+)?(secrets?|keys?|passwords?|credentials?|tokens?)'
        weight: 0.85
        target: message_content
{{- end }}
