{{- if .Values.threatSignatures.enabled }}
apiVersion: panoptium.io/v1alpha1
kind: ThreatSignature
metadata:
  name: obfuscated-payload
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-delete-policy": before-hook-creation
    "helm.sh/hook-weight": "10"
  labels:
    {{- include "panoptium.labels" . | nindent 4 }}
    panoptium.io/managed-by: helm
    panoptium.io/signature-set: default
spec:
  protocols:
    - mcp
    - a2a
    - gemini
  category: obfuscation
  severity: MEDIUM
  mitreAtlas: "AML.T0054"
  description: >-
    Detects obfuscated payloads using base64 encoding or high Shannon entropy,
    which may indicate attempts to bypass pattern-based detection by encoding
    malicious instructions.
  detection:
    entropy:
      enabled: true
      threshold: 4.5
      target: tool_description
    base64:
      enabled: true
      minLength: 20
      target: tool_description
{{- end }}
