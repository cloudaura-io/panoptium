{{- if .Values.threatSignatures.enabled }}
apiVersion: panoptium.io/v1alpha1
kind: ThreatSignature
metadata:
  name: mcp-role-confusion
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-delete-policy": before-hook-creation
    "helm.sh/hook-weight": "10"
  labels:
    {{- include "panoptium.labels" . | nindent 4 }}
    panoptium.io/managed-by: helm
    panoptium.io/signature-set: default
spec:
  protocols:
    - mcp
  category: role_confusion
  severity: CRITICAL
  mitreAtlas: "AML.T0051.001"
  description: >-
    Detects role confusion attacks where a tool description attempts to
    reassign the LLM's identity or persona, typically using phrases like
    "you are now" to override system-level instructions.
  detection:
    patterns:
      - regex: '(?i)you\s+are\s+now\b'
        weight: 0.9
        target: tool_description
{{- end }}
