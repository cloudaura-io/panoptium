{{- if .Values.threatSignatures.enabled }}
apiVersion: panoptium.io/v1alpha1
kind: ThreatSignature
metadata:
  name: mcp-tool-shadowing
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-delete-policy": before-hook-creation
    "helm.sh/hook-weight": "10"
  labels:
    {{- include "panoptium.labels" . | nindent 4 }}
    panoptium.io/managed-by: helm
    panoptium.io/signature-set: default
spec:
  protocols:
    - mcp
  category: tool_manipulation
  severity: HIGH
  mitreAtlas: "AML.T0052"
  description: >-
    Detects tool shadowing attacks where a tool description attempts to
    redefine or impersonate another tool by claiming precedence, replacing
    functionality, or instructing the LLM to use it instead of another tool.
  detection:
    patterns:
      - regex: '(?i)(use\s+this\s+tool\s+instead|replaces?\s+(the\s+)?(original|default)|takes?\s+precedence|higher\s+priority\s+than)'
        weight: 0.85
        target: tool_description
      - regex: '(?i)do\s+not\s+use\s+(the\s+)?(other|original|default)\s+tool'
        weight: 0.9
        target: tool_description
{{- end }}
