# Default values for panoptium.

# -- Number of controller manager replicas
replicaCount: 1

image:
  # -- Container image repository
  repository: ghcr.io/panoptium/panoptium
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Image tag (defaults to appVersion)
  tag: ""

# -- Image pull secrets
imagePullSecrets: []
# -- Override the chart name
nameOverride: ""
# -- Override the full name
fullnameOverride: ""

serviceAccount:
  # -- Create a ServiceAccount
  create: true
  # -- Annotations for the ServiceAccount
  annotations: {}
  # -- ServiceAccount name (generated if not set)
  name: ""

# Controller manager configuration
controller:
  # -- Enable leader election for HA
  leaderElect: true
  # -- Metrics bind address (0 to disable)
  metricsBindAddress: ":8443"
  # -- Health probe bind address
  healthProbeBindAddress: ":8081"
  # -- Enable secure metrics via HTTPS
  secureMetrics: true

  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

# ExtProc gRPC server configuration
extproc:
  # -- Enable the ExtProc gRPC server
  enabled: true
  # -- ExtProc gRPC server port
  port: 9001

# Webhook configuration
webhook:
  # -- Enable admission webhooks
  enabled: true
  # -- Use cert-manager for webhook certificates
  certManager: false
  # -- Webhook service port
  port: 9443

# Observer DaemonSet configuration
observer:
  # -- Enable the observer DaemonSet
  enabled: false
  image:
    # -- Observer image repository
    repository: ghcr.io/panoptium/panoptium-observer
    # -- Observer image pull policy
    pullPolicy: IfNotPresent
    # -- Observer image tag
    tag: ""
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

# OpenTelemetry configuration
otel:
  # -- Enable OpenTelemetry export
  enabled: false
  # -- OTLP endpoint
  endpoint: ""

# NATS JetStream configuration
nats:
  # -- NATS storage directory
  storageDir: /data/nats
  # -- Maximum stream size
  maxStreamSize: 1Gi

# -- Pod annotations
podAnnotations: {}

# -- Pod security context
podSecurityContext: {}

# -- Container security context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true

# -- Node selector
nodeSelector: {}

# -- Tolerations
tolerations: []

# -- Affinity rules
affinity: {}

# Network Policy configuration
# Controls ingress access to the gateway (ExtProc) port. Network admission is
# enforced at the kernel/CNI level via NetworkPolicy, not in ExtProc.
networkPolicy:
  # -- Enable the default NetworkPolicy restricting gateway ingress
  enabled: true
  gatewayIngress:
    # -- Allow ingress from all namespaces (set to false to restrict)
    allowAllNamespaces: true
    # -- Restrict ingress to pods matching this namespaceSelector (used when allowAllNamespaces is false)
    # namespaceSelector:
    #   matchLabels:
    #     kubernetes.io/metadata.name: ai-agents
    # -- Restrict ingress to pods matching this podSelector
    # podSelector:
    #   matchLabels:
    #     app: agent

# AgentGateway integration
gateway:
  identityPolicy:
    # -- Deploy an AgentgatewayPolicy that injects X-Forwarded-For
    #    with the downstream pod's source IP for native identity resolution.
    enabled: true
    # -- Name of the Gateway resource to target
    gatewayName: "agentgateway"

# Threat Signatures (CRD-based detection)
threatSignatures:
  # -- Deploy default threat signature CRDs
  enabled: true

# -- Namespace exclusions for the mutating webhook
excludedNamespaces:
  - kube-system
