---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.4
  name: panoptiumthreatsignatures.panoptium.io
spec:
  group: panoptium.io
  names:
    kind: PanoptiumThreatSignature
    listKind: PanoptiumThreatSignatureList
    plural: panoptiumthreatsignatures
    singular: panoptiumthreatsignature
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Signature identifier
      jsonPath: .spec.signatureID
      name: SignatureID
      type: string
    - description: Threat severity
      jsonPath: .spec.severity
      name: Severity
      type: string
    - description: Whether signature is active
      jsonPath: .spec.enabled
      name: Enabled
      type: boolean
    - description: Total detections
      jsonPath: .status.detectionCount
      name: Detections
      type: integer
    - description: Ready status
      jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          PanoptiumThreatSignature is the Schema for the panoptiumthreatsignatures API.
          It defines threat detection patterns that identify specific attack techniques
          or suspicious behaviors in monitored AI agent traffic and kernel activity.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Spec defines the desired threat signature configuration.
            properties:
              description:
                description: Description is a human-readable description of the threat
                  this signature detects.
                minLength: 1
                type: string
              detectionPoints:
                description: |-
                  DetectionPoints lists the detection layers that can identify this threat.
                  Valid values: L1-extproc, L2-network, L3-ebpf, L4-behavioral.
                items:
                  type: string
                type: array
              enabled:
                default: true
                description: Enabled indicates whether this signature is active for
                  detection.
                type: boolean
              mitreTactic:
                description: MITRETactic is the MITRE ATT&CK tactic reference for
                  this threat.
                type: string
              mitreTechnique:
                description: MITRETechnique is the MITRE ATT&CK technique reference
                  for this threat.
                type: string
              patterns:
                description: Patterns is the list of detection patterns that define
                  how to identify this threat.
                items:
                  description: DetectionPattern defines a single detection pattern
                    within a threat signature.
                  properties:
                    eventCategory:
                      description: EventCategory is the event category to match (e.g.,
                        "syscall", "network", "llm").
                      minLength: 1
                      type: string
                    match:
                      description: Match is a CEL expression for pattern matching
                        against events in this category.
                      minLength: 1
                      type: string
                    windowSeconds:
                      description: |-
                        WindowSeconds is the time window in seconds for temporal pattern matching.
                        Events outside this window are not correlated.
                      format: int32
                      minimum: 0
                      type: integer
                  required:
                  - eventCategory
                  - match
                  type: object
                minItems: 1
                type: array
              severity:
                description: Severity indicates the severity level of threats matching
                  this signature.
                enum:
                - INFO
                - LOW
                - MEDIUM
                - HIGH
                - CRITICAL
                type: string
              signatureID:
                description: |-
                  SignatureID is a unique identifier for this threat signature.
                  Must match the pattern PAN-SIG-XXXX where X is a digit.
                pattern: ^PAN-SIG-[0-9]{4}$
                type: string
            required:
            - description
            - patterns
            - severity
            - signatureID
            type: object
          status:
            description: Status reflects the observed state of the threat signature.
            properties:
              conditions:
                description: |-
                  Conditions represent the latest available observations of the signature's state.
                  Supported condition types: Ready, Active, Degraded.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              detectionCount:
                description: DetectionCount is the total number of times this signature
                  has matched.
                format: int64
                type: integer
              falsePositiveRate:
                description: FalsePositiveRate is the estimated false positive percentage
                  for this signature.
                type: string
              lastDetection:
                description: LastDetection is the timestamp of the last time this
                  signature matched.
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
