---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.4
  name: panoptiumagentprofiles.panoptium.io
spec:
  group: panoptium.io
  names:
    kind: PanoptiumAgentProfile
    listKind: PanoptiumAgentProfileList
    plural: panoptiumagentprofiles
    singular: panoptiumagentprofile
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Agent type
      jsonPath: .spec.agentType
      name: Type
      type: string
    - description: Learning mode
      jsonPath: .spec.learningMode
      name: Learning
      type: boolean
    - description: Baseline health
      jsonPath: .status.baselineHealth
      name: Health
      type: string
    - description: Matching agents
      jsonPath: .status.matchingAgents
      name: Agents
      type: integer
    - description: Ready status
      jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          PanoptiumAgentProfile is the Schema for the panoptiumagentprofiles API.
          It defines behavioral baselines for AI agent pods, enabling anomaly detection
          by establishing expected patterns of tool calls, resource usage, and network activity.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Spec defines the desired agent profile configuration.
            properties:
              agentSelector:
                description: AgentSelector selects the agent pods this profile describes.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              agentType:
                description: |-
                  AgentType is a classification label for the agent (e.g., "coding-assistant",
                  "data-analyst", "autonomous-agent").
                minLength: 1
                type: string
              baselines:
                description: Baselines defines the expected behavioral baselines for
                  agents matching this profile.
                properties:
                  expectedToolCalls:
                    description: ExpectedToolCalls is the list of tool/function names
                      the agent normally invokes.
                    items:
                      type: string
                    type: array
                  maxRequestsPerMinute:
                    description: MaxRequestsPerMinute is the expected request rate
                      ceiling for this agent.
                    format: int32
                    minimum: 0
                    type: integer
                  normalResourceUsage:
                    description: NormalResourceUsage defines expected CPU, memory,
                      and network bandwidth baselines.
                    properties:
                      cpuMillicores:
                        description: CPUMillicores is the expected baseline CPU usage
                          in millicores.
                        format: int32
                        type: integer
                      memoryMB:
                        description: MemoryMB is the expected baseline memory usage
                          in megabytes.
                        format: int32
                        type: integer
                      networkBandwidthKBps:
                        description: NetworkBandwidthKBps is the expected baseline
                          network bandwidth in kilobytes per second.
                        format: int32
                        type: integer
                    type: object
                  typicalNetworkDestinations:
                    description: |-
                      TypicalNetworkDestinations is the list of expected egress destinations
                      (hostnames or CIDRs) the agent normally communicates with.
                    items:
                      type: string
                    type: array
                type: object
              learningMode:
                default: false
                description: |-
                  LearningMode indicates whether the profile is in learning mode.
                  When true, baselines are auto-updated based on observed behavior.
                type: boolean
            required:
            - agentSelector
            - agentType
            type: object
          status:
            description: Status reflects the observed state of the agent profile.
            properties:
              baselineHealth:
                description: |-
                  BaselineHealth indicates the current health of the baselines.
                  Values: healthy, degraded, learning.
                type: string
              conditions:
                description: |-
                  Conditions represent the latest available observations of the profile's state.
                  Supported condition types: Ready, Learning, BaselineEstablished.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lastBaselineUpdate:
                description: LastBaselineUpdate is the timestamp of the last baseline
                  update.
                format: date-time
                type: string
              matchingAgents:
                description: MatchingAgents is the number of agent pods matching the
                  agentSelector.
                format: int32
                type: integer
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
