---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.4
  name: panoptiumpolicies.panoptium.io
spec:
  group: panoptium.io
  names:
    kind: PanoptiumPolicy
    listKind: PanoptiumPolicyList
    plural: panoptiumpolicies
    singular: panoptiumpolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Enforcement mode
      jsonPath: .spec.enforcementMode
      name: Enforcement
      type: string
    - description: Policy priority
      jsonPath: .spec.priority
      name: Priority
      type: integer
    - description: Number of rules
      jsonPath: .status.ruleCount
      name: Rules
      type: integer
    - description: Matching pods
      jsonPath: .status.matchingPods
      name: Pods
      type: integer
    - description: Ready status
      jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          PanoptiumPolicy is the Schema for the panoptiumpolicies API.
          It defines namespace-scoped security policies with trigger-predicate-action rules
          for monitoring and controlling AI agent behavior within Kubernetes.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Spec defines the desired policy configuration.
            properties:
              enforcementMode:
                default: audit
                description: EnforcementMode controls whether actions are enforced,
                  audited, or disabled.
                enum:
                - enforcing
                - audit
                - disabled
                type: string
              priority:
                description: |-
                  Priority determines evaluation order when multiple policies match the same pod.
                  Higher priority policies override lower ones on conflict. Range: 1-1000.
                format: int32
                maximum: 1000
                minimum: 1
                type: integer
              rules:
                description: Rules is the list of trigger-predicate-action rules evaluated
                  by this policy.
                items:
                  description: PolicyRule defines a single trigger-predicate-action
                    rule within a PanoptiumPolicy.
                  properties:
                    action:
                      description: Action defines the response to take when the rule
                        matches.
                      properties:
                        parameters:
                          additionalProperties:
                            type: string
                          description: |-
                            Parameters contains action-specific configuration as key-value pairs.
                            For rateLimit: "requestsPerMinute", "burstSize"
                            For customWebhook: "url", "timeout"
                          type: object
                        type:
                          description: Type is the kind of action to take.
                          enum:
                          - allow
                          - deny
                          - alert
                          - quarantine
                          - rateLimit
                          - customWebhook
                          type: string
                      required:
                      - type
                      type: object
                    name:
                      description: Name is a human-readable identifier for this rule.
                      maxLength: 253
                      minLength: 1
                      type: string
                    predicates:
                      description: |-
                        Predicates are conditions that must all be true for the action to execute.
                        Each predicate contains a CEL expression evaluated against the triggering event.
                      items:
                        description: Predicate defines a condition that must be true
                          for a rule's action to execute.
                        properties:
                          cel:
                            description: |-
                              CEL is a Common Expression Language expression evaluated against the event.
                              The expression must return a boolean value.
                            minLength: 1
                            type: string
                        required:
                        - cel
                        type: object
                      type: array
                    severity:
                      description: Severity indicates the severity level of events
                        matching this rule.
                      enum:
                      - INFO
                      - LOW
                      - MEDIUM
                      - HIGH
                      - CRITICAL
                      type: string
                    trigger:
                      description: Trigger defines the event that activates this rule.
                      properties:
                        eventCategory:
                          description: EventCategory is the top-level event category
                            to match (e.g., "syscall", "network", "llm").
                          minLength: 1
                          type: string
                        eventSubcategory:
                          description: |-
                            EventSubcategory is the event subcategory pattern to match (e.g., "execve", "connect", "request.start").
                            Supports glob patterns with '*' wildcard.
                          type: string
                      required:
                      - eventCategory
                      type: object
                  required:
                  - action
                  - name
                  - severity
                  - trigger
                  type: object
                minItems: 1
                type: array
              targetSelector:
                description: TargetSelector selects the pods this policy applies to.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
            required:
            - enforcementMode
            - priority
            - rules
            - targetSelector
            type: object
          status:
            description: Status reflects the observed state of the policy.
            properties:
              conditions:
                description: |-
                  Conditions represent the latest available observations of the policy's state.
                  Supported condition types: Ready, Enforcing, Degraded, Error.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              matchingPods:
                description: MatchingPods is the number of pods currently matching
                  the targetSelector.
                format: int32
                type: integer
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
              ruleCount:
                description: RuleCount is the number of compiled rules in this policy.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
