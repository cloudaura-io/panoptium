name: cli-release

on:
  push:
    tags:
      - "cli/v*"
  workflow_dispatch:
    inputs:
      snapshot:
        description: "Run goreleaser in snapshot mode (no publish)"
        required: false
        default: "false"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: "1.25.x"
          cache: true

      - name: Run CLI unit tests
        run: |
          go test ./internal/cli/...
          go vet ./cmd/panoptium/... ./internal/cli/...

      - name: Install cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da

      - name: Install syft (for SBOM)
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610

      - name: Goreleaser
        if: ${{ inputs.snapshot != 'true' && startsWith(github.ref, 'refs/tags/cli/v') }}
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a
        with:
          distribution: goreleaser
          version: "v2.7.0"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Goreleaser snapshot
        if: ${{ inputs.snapshot == 'true' || !startsWith(github.ref, 'refs/tags/cli/v') }}
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a
        with:
          distribution: goreleaser
          version: "v2.7.0"
          args: release --clean --snapshot --skip=publish

      - name: Upload snapshot artifacts
        if: ${{ inputs.snapshot == 'true' || !startsWith(github.ref, 'refs/tags/cli/v') }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: panoptium-cli-snapshot
          path: dist/*
          retention-days: 14
