name: cli-release

on:
  push:
    tags:
      - "cli/v*"
  workflow_dispatch:
    inputs:
      snapshot:
        description: "Run goreleaser in snapshot mode (no publish)"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Run CLI unit tests
        run: |
          go test ./internal/cli/...
          go vet ./cmd/panoptium/... ./internal/cli/...

      - name: Install syft (for SBOM)
        uses: anchore/sbom-action/download-syft@v0

      - name: Goreleaser
        if: ${{ inputs.snapshot != 'true' && startsWith(github.ref, 'refs/tags/cli/v') }}
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Goreleaser snapshot
        if: ${{ inputs.snapshot == 'true' || !startsWith(github.ref, 'refs/tags/cli/v') }}
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --snapshot --skip=publish

      - name: Upload snapshot artifacts
        if: ${{ inputs.snapshot == 'true' || !startsWith(github.ref, 'refs/tags/cli/v') }}
        uses: actions/upload-artifact@v4
        with:
          name: panoptium-cli-snapshot
          path: dist/*
          retention-days: 14
