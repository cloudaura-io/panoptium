name: E2E Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'scripts/build-threat-manifest.py'
      - '*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'scripts/build-threat-manifest.py'
      - '*.md'

jobs:
  test-e2e:
    name: E2E (${{ matrix.deploy-method }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        deploy-method: [kustomize, helm]
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '~1.25'

      - name: Install the latest version of kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        run: kind version

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Create kind cluster
        run: kind create cluster

      - name: Running Test e2e
        env:
          DEPLOY_METHOD: ${{ matrix.deploy-method }}
        run: |
          go mod tidy
          make test-e2e-full
