name: Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'scripts/build-threat-manifest.py'
      - '*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'scripts/build-threat-manifest.py'
      - '*.md'

jobs:
  test:
    name: Run on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '~1.25'

      - name: Running Tests
        run: |
          go mod tidy
          make test
