version: 2

monorepo:
  tag_prefix: cli/v

project_name: panoptium

before:
  hooks:
    - go mod tidy
    - go vet ./cmd/panoptium/... ./internal/cli/...

builds:
  - id: panoptium
    main: ./cmd/panoptium
    binary: panoptium
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/panoptium/panoptium/internal/cli/version.Version={{.Version}}
      - -X github.com/panoptium/panoptium/internal/cli/version.Commit={{.ShortCommit}}
      - -X github.com/panoptium/panoptium/internal/cli/version.Date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: panoptium
    ids: [panoptium]
    name_template: >-
      panoptium_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE
      - docs/cli.md

checksum:
  name_template: "panoptium_{{ .Version }}_checksums.txt"
  algorithm: sha256

signs:
  - cmd: cosign
    env:
      - COSIGN_EXPERIMENTAL=1
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

sboms:
  - artifacts: archive
    documents:
      - "{{ .ArtifactName }}.sbom.json"

snapshot:
  version_template: "{{ .Version }}-snapshot-{{ .ShortCommit }}"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^conductor:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: Features
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: Bug fixes
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: Other changes
      order: 999

release:
  github:
    owner: cloudaura-io
    name: INTERNAL-panoptium
  name_template: "panoptium-cli {{ .Version }}"
  header: |
    ## panoptium-cli {{ .Version }}

    First-party CLI for the Panoptium Kubernetes operator. Validate
    policies offline, introspect cluster state, tail the event bus,
    and manage quarantine state.

    ### Install

    Download the archive for your platform below, verify its checksum
    against `panoptium_{{ .Version }}_checksums.txt`, extract, and move
    the `panoptium` binary onto your `$PATH`.

    ```bash
    tar -xzf panoptium_{{ .Version }}_linux_amd64.tar.gz
    sudo mv panoptium /usr/local/bin/
    panoptium version
    ```

    Or build from source:

    ```bash
    git clone https://github.com/cloudaura-io/INTERNAL-panoptium && cd INTERNAL-panoptium
    git checkout cli/v{{ .Version }}
    go build -o panoptium ./cmd/panoptium
    ```

  footer: |
    ### Documentation

    - CLI reference: [docs/cli.md](https://github.com/cloudaura-io/INTERNAL-panoptium/blob/main/docs/cli.md)
    - Quickstart: `panoptium policy validate -f examples/policies/`
