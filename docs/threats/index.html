<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent Threat Catalog - Panoptium</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --sans: system-ui, -apple-system, 'Segoe UI', sans-serif;
  --mono: 'SF Mono', 'Cascadia Code', 'Menlo', monospace;
}

[data-theme="dark"] {
  --bg: #0d0d0d; --surface: #161616; --card: #1a1a1a; --card-hover: #212121;
  --border: #2a2a2a; --border-hover: #3a3a3a;
  --text: #ccc8be; --text-dim: #7a7568; --text-heading: #e8e4db;
  --accent: #c9a96e; --accent-dim: rgba(201,169,110,.1);
  --code-bg: #111; --code-border: #282828;
  --shadow: 0 2px 8px rgba(0,0,0,.4); --shadow-hover: 0 8px 24px rgba(0,0,0,.5);
  --scrollbar: #333; --badge-text: #fff;
}
[data-theme="light"] {
  --bg: #f4f0e8; --surface: #faf7f0; --card: #fff; --card-hover: #fffdf8;
  --border: #ddd5c5; --border-hover: #ccc0a8;
  --text: #3a3632; --text-dim: #8a8275; --text-heading: #1a1714;
  --accent: #9a7030; --accent-dim: rgba(154,112,48,.06);
  --code-bg: #f0ebe0; --code-border: #ddd5c5;
  --shadow: 0 2px 8px rgba(0,0,0,.08); --shadow-hover: 0 8px 24px rgba(0,0,0,.12);
  --scrollbar: #ccc; --badge-text: #fff;
}

body { background: var(--bg); color: var(--text); font-family: var(--sans); line-height: 1.6; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }


.header { position: sticky; top: 0; z-index: 100; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; }
.header-left { display: flex; align-items: center; gap: 16px; }
.logo { font-weight: 600; font-size: 15px; color: var(--text-heading); letter-spacing: -.02em; }
.logo span { color: var(--accent); }
.back-btn { display: none; background: none; border: 1px solid var(--border); color: var(--text); padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; align-items: center; gap: 4px; }
.back-btn:hover { border-color: var(--border-hover); background: var(--card); }
.back-btn svg { width: 14px; height: 14px; }
.header-right { display: flex; align-items: center; gap: 12px; }
.search { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 6px 12px 6px 32px; border-radius: 8px; font-size: 14px; width: 240px; outline: none; }
.search:focus { border-color: var(--accent); }
.search-wrap { position: relative; }
.search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--text-dim); pointer-events: none; }
.theme-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; padding: 6px; border-radius: 6px; display: flex; }
.theme-btn:hover { color: var(--text); background: var(--card); }
.theme-btn svg { width: 18px; height: 18px; }
[data-theme="dark"] .sun { display: none; }
[data-theme="light"] .moon { display: none; }
.count-badge { font-size: 12px; color: var(--text-dim); background: var(--card); padding: 2px 10px; border-radius: 10px; border: 1px solid var(--border); }


.landing { max-width: 1200px; margin: 0 auto; padding: 32px 24px 64px; }
.landing h1 { font-size: 28px; font-weight: 700; color: var(--text-heading); margin-bottom: 4px; letter-spacing: -.03em; }
.landing > p { color: var(--text-dim); font-size: 15px; margin-bottom: 32px; }
.category-section { margin-bottom: 32px; }
.category-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.category-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.category-header h2 { font-size: 16px; font-weight: 600; color: var(--text-heading); }
.category-header .cat-count { font-size: 12px; color: var(--text-dim); }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }


.card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; cursor: pointer; transition: all .15s ease; display: flex; flex-direction: column; gap: 8px; }
.card:hover { background: var(--card-hover); border-color: var(--border-hover); box-shadow: var(--shadow-hover); transform: translateY(-1px); }
.card-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.card-id { font-family: var(--mono); font-size: 13px; font-weight: 600; padding: 2px 8px; border-radius: 5px; color: var(--badge-text); white-space: nowrap; }
.card-difficulty { font-size: 11px; padding: 2px 8px; border-radius: 5px; border: 1px solid var(--border); color: var(--text-dim); text-transform: uppercase; letter-spacing: .04em; }
.card-difficulty[data-d="easy"] { color: #6ba368; border-color: #6ba36844; }
.card-difficulty[data-d="medium"] { color: #c9a96e; border-color: #c9a96e44; }
.card-difficulty[data-d="hard"] { color: #c45d4f; border-color: #c45d4f44; }
.card-difficulty[data-d="very-hard"] { color: #d43f2f; border-color: #d43f2f66; font-weight: 600; }
.card h3 { font-size: 15px; font-weight: 600; color: var(--text-heading); line-height: 1.35; }
.card p { font-size: 13px; color: var(--text-dim); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }


.reader { display: none; max-width: 820px; margin: 0 auto; padding: 32px 24px 80px; }
.reader.active { display: block; }
.prose { color: var(--text); line-height: 1.75; font-size: 15px; }
.prose h1 { font-size: 26px; font-weight: 700; color: var(--text-heading); margin: 0 0 24px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.prose h2 { font-size: 20px; margin: 32px 0 12px; color: var(--text-heading); }
.prose h3 { font-size: 17px; margin: 24px 0 8px; color: var(--text-heading); }
.prose h4 { font-size: 15px; margin: 20px 0 6px; color: var(--text-heading); }
.prose p { margin: 0 0 12px; }
.prose ul, .prose ol { margin: 0 0 12px; padding-left: 24px; }
.prose li { margin-bottom: 6px; }
.prose li > ul, .prose li > ol { margin-top: 4px; margin-bottom: 0; }
.prose strong { color: var(--text-heading); font-weight: 600; }
.prose code { background: var(--code-bg); border: 1px solid var(--code-border); padding: 1px 5px; border-radius: 4px; font-family: var(--mono); font-size: 13px; }
.prose pre { background: var(--code-bg); border: 1px solid var(--code-border); border-radius: 8px; padding: 16px; margin: 0 0 16px; overflow-x: auto; }
.prose pre code { background: none; border: none; padding: 0; font-size: 13px; }
.prose table { width: 100%; border-collapse: collapse; margin: 0 0 16px; font-size: 14px; }
.prose th, .prose td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
.prose th { background: var(--surface); font-weight: 600; color: var(--text-heading); }
.prose blockquote { border-left: 3px solid var(--accent); padding: 8px 16px; margin: 0 0 12px; color: var(--text-dim); background: var(--accent-dim); border-radius: 0 6px 6px 0; }
.prose hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

.no-results { text-align: center; padding: 48px; color: var(--text-dim); font-size: 15px; }

@media (max-width: 640px) {
  .search { width: 140px; }
  .grid { grid-template-columns: 1fr; }
  .landing h1 { font-size: 22px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <button class="back-btn" id="backBtn" onclick="showLanding()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back
    </button>
    <div class="logo"><span>Panoptium</span> Threat Catalog</div>
    <span class="count-badge" id="countBadge"></span>
  </div>
  <div class="header-right">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" class="search" id="searchInput" placeholder="Filter threats..." oninput="filterCards()">
    </div>
    <button class="theme-btn" onclick="toggleTheme()" aria-label="Toggle theme">
      <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
  </div>
</div>

<div class="landing" id="landing">
  <h1>AI Agent Threat Catalog</h1>
  <p>Each card is a standalone markdown file. Add, edit, or remove entries in <code>threats/</code>.</p>
  <div id="categories"></div>
  <div class="no-results" id="noResults" style="display:none">No threats match your search.</div>
</div>

<div class="reader" id="reader">
  <div class="prose" id="readerContent"></div>
</div>

<script>
const CATEGORIES = {
  A: { name: 'Input Manipulation', color: '#c45d4f' },
  B: { name: 'Tool & MCP Attacks', color: '#d4854a' },
  C: { name: 'Data Exfiltration', color: '#c9a96e' },
  D: { name: 'Privilege & Access', color: '#b04488' },
  E: { name: 'Multi-Agent', color: '#9b7ec8' },
  F: { name: 'Supply Chain', color: '#5d8db5' },
  G: { name: 'DoS & Resource Abuse', color: '#5dafb5' },
  H: { name: 'Evasion & Persistence', color: '#6ba368' },
  I: { name: 'Semantic & Reasoning', color: '#8a6840' },
  J: { name: 'Infrastructure', color: '#7a7a7a' },
  K: { name: 'Autonomy Risks', color: '#aa5555' },
};

let THREATS = [];

function parseFrontmatter(text) {
  const m = text.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/);
  if (!m) return { meta: {}, body: text };
  const meta = {};
  m[1].split('\n').forEach(line => {
    const kv = line.match(/^(\w+):\s*"?(.+?)"?\s*$/);
    if (kv) meta[kv[1]] = kv[2];
  });
  return { meta, body: m[2] };
}

function renderLanding() {
  const container = document.getElementById('categories');
  container.innerHTML = '';

  const grouped = {};
  THREATS.forEach(t => {
    const catId = t.id[0];
    if (!grouped[catId]) grouped[catId] = [];
    grouped[catId].push(t);
  });

  let totalVisible = 0;
  const query = (document.getElementById('searchInput').value || '').toLowerCase();

  Object.entries(CATEGORIES).forEach(([catId, cat]) => {
    const threats = (grouped[catId] || []).filter(t => {
      if (!query) return true;
      return t.id.toLowerCase().includes(query) ||
             t.title.toLowerCase().includes(query) ||
             cat.name.toLowerCase().includes(query);
    });
    if (!threats.length) return;
    totalVisible += threats.length;

    const section = document.createElement('div');
    section.className = 'category-section';
    section.innerHTML = `
      <div class="category-header">
        <div class="category-dot" style="background:${cat.color}"></div>
        <h2>${catId}. ${cat.name}</h2>
        <span class="cat-count">${threats.length}</span>
      </div>
      <div class="grid">
        ${threats.map(t => `
          <div class="card" onclick="openThreat('${t.file}')">
            <div class="card-top">
              <span class="card-id" style="background:${cat.color}">${t.id}</span>
              <span class="card-difficulty" data-d="${t.difficulty}">${t.difficulty.replace('-', ' ')}</span>
            </div>
            <h3>${t.title}</h3>
          </div>
        `).join('')}
      </div>
    `;
    container.appendChild(section);
  });

  document.getElementById('countBadge').textContent = totalVisible + ' threats';
  document.getElementById('noResults').style.display = totalVisible ? 'none' : 'block';
}

async function openThreat(file) {
  const reader = document.getElementById('reader');
  const landing = document.getElementById('landing');
  const backBtn = document.getElementById('backBtn');
  const content = document.getElementById('readerContent');

  content.innerHTML = '<p style="color:var(--text-dim)">Loading...</p>';
  landing.style.display = 'none';
  reader.classList.add('active');
  backBtn.style.display = 'flex';
  window.scrollTo(0, 0);
  location.hash = file.replace('.md', '');

  try {
    const res = await fetch(file);
    const text = await res.text();
    const { body } = parseFrontmatter(text);
    content.innerHTML = marked.parse(body);
  } catch (e) {
    content.innerHTML = `<p style="color:#c45d4f">Failed to load ${file}: ${e.message}</p>`;
  }
}

function showLanding() {
  document.getElementById('reader').classList.remove('active');
  document.getElementById('landing').style.display = 'block';
  document.getElementById('backBtn').style.display = 'none';
  location.hash = '';
  window.scrollTo(0, 0);
}

function filterCards() { renderLanding(); }

function toggleTheme() {
  const html = document.documentElement;
  const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  localStorage.setItem('theme', next);
}

const saved = localStorage.getItem('theme');
if (saved) document.documentElement.dataset.theme = saved;

fetch('manifest.json')
  .then(r => r.json())
  .then(data => {
    THREATS = data;
    renderLanding();
    if (location.hash) {
      const slug = location.hash.slice(1);
      const threat = THREATS.find(t => t.file.replace('.md', '') === slug);
      if (threat) openThreat(threat.file);
    }
  })
  .catch(err => {
    document.getElementById('categories').innerHTML =
      '<p style="color:#c45d4f;text-align:center;padding:48px">Failed to load manifest.json. Run: python3 scripts/build-threat-manifest.py</p>';
  });

window.addEventListener('hashchange', () => {
  if (!location.hash) showLanding();
});
</script>
</body>
</html>
