apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm-route
  namespace: panoptium-system
spec:
  parentRefs:
  - name: e2e-gateway
    namespace: panoptium-system
  rules:
  - matches:
    - path:
        type: Exact
        value: /v1/chat/completions
    backendRefs:
    - group: agentgateway.dev
      kind: AgentgatewayBackend
      name: mock-llm-backend
  - matches:
    - path:
        type: Exact
        value: /v1/messages
    backendRefs:
    - group: agentgateway.dev
      kind: AgentgatewayBackend
      name: mock-llm-backend
