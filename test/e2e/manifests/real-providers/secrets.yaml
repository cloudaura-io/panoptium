# Create these secrets BEFORE applying the backends.
# Replace <your-key> with actual API keys.
#
# Quick apply:
#   kubectl create secret generic openai-api-key \
#     --from-literal=Authorization="Bearer <your-openai-key>" \
#     -n panoptium-system
#
#   kubectl create secret generic anthropic-api-key \
#     --from-literal=Authorization="<your-anthropic-key>" \
#     -n panoptium-system
#
# Or apply this file after filling in the keys:
apiVersion: v1
kind: Secret
metadata:
  name: openai-api-key
  namespace: panoptium-system
type: Opaque
stringData:
  Authorization: "Bearer REPLACE_WITH_OPENAI_KEY"
---
apiVersion: v1
kind: Secret
metadata:
  name: anthropic-api-key
  namespace: panoptium-system
type: Opaque
stringData:
  Authorization: "REPLACE_WITH_ANTHROPIC_KEY"
