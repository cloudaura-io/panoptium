# Routes real LLM traffic through the e2e-gateway.
# OpenAI: /v1/chat/completions → openai-backend
# Anthropic: /v1/messages → anthropic-backend
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: real-llm-route
  namespace: panoptium-system
spec:
  parentRefs:
  - name: e2e-gateway
    namespace: panoptium-system
  rules:
  - matches:
    - path:
        type: Exact
        value: /v1/chat/completions
    backendRefs:
    - group: agentgateway.dev
      kind: AgentgatewayBackend
      name: openai-backend
  - matches:
    - path:
        type: Exact
        value: /v1/messages
    backendRefs:
    - group: agentgateway.dev
      kind: AgentgatewayBackend
      name: anthropic-backend
