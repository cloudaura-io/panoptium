apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: panoptium-extproc
  namespace: panoptium-system
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: e2e-gateway
  extProc:
  - backendRefs:
    - group: ""
      kind: Service
      name: panoptium-controller-manager-extproc
      namespace: panoptium-system
      port: 9001
    failureMode: Skip
    processingMode:
      request:
        header: Send
        body: Buffered
      response:
        header: Send
        body: Streamed
