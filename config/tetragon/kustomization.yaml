# Tetragon integration for Panoptium.
# Tetragon itself is deployed via its own Helm chart (cilium/tetragon).
# This overlay manages Panoptium-specific TracingPolicy CRDs and RBAC.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: panoptium-system

resources:
  - rbac.yaml
  - tetragon-config.yaml
  - policies/execve-monitor.yaml
  - policies/openat-monitor.yaml
  - policies/connect-monitor.yaml
  - policies/fork-monitor.yaml
  - policies/exit-monitor.yaml
  - policies/namespace-monitor.yaml
  - policies/mount-enforce.yaml
  - policies/ptrace-enforce.yaml
  - policies/bpf-selfmon.yaml
