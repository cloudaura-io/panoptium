---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.4
  name: panoptiumthreatsignatures.panoptium.io
spec:
  group: panoptium.io
  names:
    kind: PanoptiumThreatSignature
    listKind: PanoptiumThreatSignatureList
    plural: panoptiumthreatsignatures
    singular: panoptiumthreatsignature
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - description: Attack category
      jsonPath: .spec.category
      name: Category
      type: string
    - description: Threat severity
      jsonPath: .spec.severity
      name: Severity
      type: string
    - description: Compiled patterns
      jsonPath: .status.compiledPatterns
      name: Patterns
      type: integer
    - description: Ready status
      jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          PanoptiumThreatSignature is the Schema for the panoptiumthreatsignatures API.
          It defines threat detection patterns that identify specific attack techniques
          or suspicious behaviors in monitored AI agent traffic. Signatures are cluster-scoped
          and consumed by protocol parsers via the ThreatMatcher interface.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Spec defines the desired threat signature configuration.
            properties:
              category:
                description: |-
                  Category is the attack category for grouping and policy matching
                  (e.g., "prompt_injection", "data_exfiltration", "role_confusion").
                minLength: 1
                type: string
              description:
                description: Description is a human-readable description of what this
                  signature detects.
                minLength: 1
                type: string
              detection:
                description: Detection defines the detection rules for this signature.
                properties:
                  base64:
                    description: Base64 configures base64 payload detection.
                    properties:
                      enabled:
                        default: false
                        description: Enabled indicates whether base64 detection is
                          active.
                        type: boolean
                      minLength:
                        default: 20
                        description: MinLength is the minimum length of base64 strings
                          to flag.
                        minimum: 1
                        type: integer
                      target:
                        description: Target specifies where to apply base64 detection.
                        enum:
                        - tool_description
                        - tool_args
                        - message_content
                        - body
                        type: string
                    type: object
                  cel:
                    description: CEL is a list of CEL expressions for complex detection
                      rules.
                    items:
                      description: CELRule defines a CEL expression for complex detection
                        rules.
                      properties:
                        expression:
                          description: Expression is the CEL expression to evaluate.
                          minLength: 1
                          type: string
                        weight:
                          description: Weight is the score weight (0.0-1.0) for this
                            expression when matched.
                          type: number
                      required:
                      - expression
                      - weight
                      type: object
                    type: array
                  entropy:
                    description: Entropy configures entropy-based anomaly detection.
                    properties:
                      enabled:
                        default: false
                        description: Enabled indicates whether entropy analysis is
                          active.
                        type: boolean
                      target:
                        description: Target specifies where to apply entropy analysis.
                        enum:
                        - tool_description
                        - tool_args
                        - message_content
                        - body
                        type: string
                      threshold:
                        description: Threshold is the Shannon entropy threshold (bits
                          per character) above which content is flagged.
                        type: number
                    type: object
                  patterns:
                    description: Patterns is a list of regex-based detection patterns
                      with weights.
                    items:
                      description: PatternRule defines a single regex detection pattern
                        with weight and target.
                      properties:
                        regex:
                          description: Regex is the regular expression pattern to
                            match against content.
                          minLength: 1
                          type: string
                        target:
                          description: Target specifies where to apply this pattern.
                          enum:
                          - tool_description
                          - tool_args
                          - message_content
                          - body
                          type: string
                        weight:
                          description: Weight is the score weight (0.0-1.0) for this
                            pattern when matched.
                          type: number
                      required:
                      - regex
                      - target
                      - weight
                      type: object
                    type: array
                type: object
              mitreAtlas:
                description: MitreAtlas is the optional MITRE ATLAS reference (e.g.,
                  "AML.T0051.001").
                type: string
              protocols:
                description: Protocols lists which protocols this signature applies
                  to (empty = all).
                items:
                  type: string
                type: array
              severity:
                description: Severity indicates the severity level of threats matching
                  this signature.
                enum:
                - INFO
                - LOW
                - MEDIUM
                - HIGH
                - CRITICAL
                type: string
            required:
            - category
            - description
            - detection
            - severity
            type: object
          status:
            description: Status reflects the observed state of the threat signature.
            properties:
              compiledCEL:
                description: CompiledCEL is the number of successfully compiled CEL
                  expressions.
                format: int32
                type: integer
              compiledPatterns:
                description: CompiledPatterns is the number of successfully compiled
                  regex patterns.
                format: int32
                type: integer
              conditions:
                description: |-
                  Conditions represent the latest available observations of the signature's state.
                  Supported condition types: Ready, Invalid.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
