apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: panoptium-ebpf-observer
  namespace: panoptium-system
  labels:
    app.kubernetes.io/name: panoptium-ebpf-observer
    app.kubernetes.io/component: ebpf-observer
    app.kubernetes.io/part-of: panoptium
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: panoptium-ebpf-observer
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: panoptium-ebpf-observer
        app.kubernetes.io/component: ebpf-observer
        app.kubernetes.io/part-of: panoptium
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      # Host PID namespace for process tree visibility.
      hostPID: true
      # Tolerate control-plane nodes (optional, for full cluster coverage).
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      # Only schedule on Linux nodes.
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/os
                    operator: In
                    values:
                      - linux
      serviceAccountName: panoptium-ebpf-observer
      containers:
        - name: observer
          image: panoptium/ebpf-observer:latest
          args:
            - "--health-port=8080"
            - "--nats-url=nats://panoptium-nats:4222"
          securityContext:
            privileged: false
            capabilities:
              add:
                - BPF
                - PERFMON
                - SYS_ADMIN
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: false
            runAsUser: 0
          resources:
            requests:
              cpu: 200m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          ports:
            - name: health
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 2
          volumeMounts:
            - name: bpf-fs
              mountPath: /sys/fs/bpf
            - name: cgroup-fs
              mountPath: /sys/fs/cgroup
              readOnly: true
            - name: debug-fs
              mountPath: /sys/kernel/debug
              readOnly: true
      volumes:
        - name: bpf-fs
          hostPath:
            path: /sys/fs/bpf
            type: DirectoryOrCreate
        - name: cgroup-fs
          hostPath:
            path: /sys/fs/cgroup
            type: Directory
        - name: debug-fs
          hostPath:
            path: /sys/kernel/debug
            type: Directory
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: panoptium-ebpf-observer
  namespace: panoptium-system
  labels:
    app.kubernetes.io/name: panoptium-ebpf-observer
    app.kubernetes.io/part-of: panoptium
