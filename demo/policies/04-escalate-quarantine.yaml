---
# Escalation policy: 3 denied tool_call requests within 60 seconds triggers quarantine.
# Shows how Panoptium automatically isolates a persistently misbehaving agent.
# Works together with 02-deny-bash-tool.yaml — repeated bash attempts trigger this.
apiVersion: panoptium.io/v1alpha1
kind: AgentPolicy
metadata:
  name: demo-escalate-quarantine
  namespace: panoptium-system
spec:
  enforcementMode: enforcing
  priority: 100
  targetSelector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: e2e-gateway
  rules:
    - name: deny-and-escalate-bash
      severity: CRITICAL
      trigger:
        eventCategory: protocol
        eventSubcategory: tool_call
      predicates:
        - cel: "event.toolName == 'bash' || event.toolName == 'shell_exec' || event.toolName == 'run_command'"
      action:
        type: deny
        parameters:
          message: "dangerous tool blocked — repeated violations will quarantine this agent"
          escalationThreshold: "3"
          escalationWindow: "60"
          escalationAction: "quarantine"
