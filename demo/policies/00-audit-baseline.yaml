---
# Observe all LLM traffic without blocking anything.
# Audit mode: policy decisions are logged and published to NATS, never enforced.
apiVersion: panoptium.io/v1alpha1
kind: AgentClusterPolicy
metadata:
  name: demo-audit-baseline
spec:
  targetSelector: {}
  enforcementMode: audit
  priority: 10
  rules:
    - name: audit-all-tool-calls
      severity: INFO
      trigger:
        eventCategory: protocol
        eventSubcategory: tool_call
      action:
        type: deny
    - name: audit-all-llm-requests
      severity: INFO
      trigger:
        eventCategory: llm
        eventSubcategory: llm_request
      action:
        type: deny
