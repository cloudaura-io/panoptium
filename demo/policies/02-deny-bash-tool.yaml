---
# Block dangerous tools: bash, shell_exec, run_command, execute.
# Any request declaring these tools gets HTTP 403.
apiVersion: panoptium.io/v1alpha1
kind: AgentClusterPolicy
metadata:
  name: demo-deny-bash
spec:
  targetSelector: {}
  enforcementMode: enforcing
  priority: 100
  rules:
    - name: block-dangerous-tools
      severity: HIGH
      trigger:
        eventCategory: protocol
        eventSubcategory: tool_call
      predicates:
        - cel: "event.toolNames.contains('bash') || event.toolNames.contains('shell_exec') || event.toolNames.contains('run_command') || event.toolNames.contains('execute')"
      action:
        type: deny
        parameters:
          message: "dangerous tool blocked by Panoptium security policy"
