---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: openai-backend
  namespace: panoptium-system
spec:
  ai:
    groups:
    - providers:
      - name: openai
        openai: {}
        host: api.openai.com
        port: 443
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: demo-openai-route
  namespace: panoptium-system
spec:
  parentRefs:
  - name: e2e-gateway
    namespace: panoptium-system
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /v1/
    backendRefs:
    - group: agentgateway.dev
      kind: AgentgatewayBackend
      name: openai-backend
