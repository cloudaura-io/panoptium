---
# NOTE: AgentGateway v1.0.1 does not support ExtProc ImmediateResponse.
# Deny actions (HTTP 403) and rateLimit actions (HTTP 429) will cause the
# gateway to return 503 instead of the expected status code. This is an
# AgentGateway limitation, not a Panoptium bug. Tool stripping (deny on
# tool_call) works correctly. Track: agentgateway/agentgateway#TBD
#
# Demo policy: strip pod log access tool from agent requests.
# Demonstrates Panoptium tool stripping enforcement. The agent's request to OpenAI
# includes tools: [{name: "k8s_get_pod_logs"}]. Panoptium removes that tool from
# the tools[] array before forwarding to the LLM. The LLM never sees the tool,
# so it cannot use it. Other tools in the request work normally.
# If the LLM response still contains a tool_call for the banned tool,
# Panoptium intercepts mid-stream with HTTP 403 (defense-in-depth).
apiVersion: panoptium.io/v1alpha1
kind: AgentClusterPolicy
metadata:
  name: demo-deny-pod-logs
spec:
  targetSelector: {}
  enforcementMode: enforcing
  priority: 100
  rules:
    - name: block-pod-log-access
      severity: HIGH
      trigger:
        eventCategory: protocol
        eventSubcategory: tool_call
      predicates:
        - cel: "event.toolName == 'k8s_get_pod_logs'"
      action:
        type: deny
        parameters:
          message: "pod log access blocked by Panoptium security policy"
