---
# ModelConfig: Routes Kagent through AgentGateway to OpenAI.
# The gateway's ExtProc filter (Panoptium) inspects all LLM traffic.
# Auth: kagent sends the real API key; gateway passes it through to OpenAI.
apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: demo-model-config
  namespace: kagent
spec:
  provider: OpenAI
  model: gpt-4o-mini
  apiKeySecret: openai-api-key
  apiKeySecretKey: api-key
  openAI:
    baseUrl: "http://e2e-gateway.panoptium-system.svc.cluster.local:8080/v1"
