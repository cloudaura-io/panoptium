---
# Agent: Kubernetes operations assistant routed through Panoptium-secured AgentGateway.
# Uses the built-in kagent-tool-server for Kubernetes operations.
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: demo-k8s-agent
  namespace: kagent
  labels:
    app: kagent-demo
    panoptium.io/monitored: "true"
spec:
  type: Declarative
  description: "Demo agent for the Panoptium + Kagent + AgentGateway showcase"
  declarative:
    modelConfig: demo-model-config
    systemMessage: |
      You are a Kubernetes operations assistant running inside a cluster.
      You can inspect cluster resources using the Kubernetes tools available to you.
      Always explain what you are doing before executing any action.
      Be concise and helpful. Focus on operational insights.
      Do NOT attempt to run bash, shell_exec, or any arbitrary command execution tools.
    tools:
      - type: McpServer
        mcpServer:
          apiGroup: kagent.dev
          kind: RemoteMCPServer
          name: kagent-tool-server
          toolNames:
            - k8s_get_resources
            - k8s_get_pod_logs
